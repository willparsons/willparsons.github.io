name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - run: rustup target add wasm32-unknown-unknown
      - run: cargo add trunk
      - name: Build
        run: trunk build --release
      - name: Upload artifacts
        uses: actions/upload-pages-artifact@v1
        with:
          path: dist
